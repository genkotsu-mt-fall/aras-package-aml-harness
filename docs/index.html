<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>aras-package-aml-harness</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #5b6472;
        --border: #d7dce5;
        --accent: #0f766e;
        --accent-dark: #115e59;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background: var(--bg);
        font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      }

      main {
        width: min(880px, calc(100% - 40px));
        margin: 0 auto;
        padding: 72px 0;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 4rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .lead {
        max-width: 620px;
        margin: 20px 0 36px;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.75;
      }

      .links {
        display: grid;
        gap: 16px;
      }

      .link-card {
        display: block;
        padding: 24px;
        color: inherit;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        text-decoration: none;
      }

      .link-card:hover,
      .link-card:focus-visible {
        border-color: var(--accent);
        outline: 3px solid rgba(15, 118, 110, 0.18);
        outline-offset: 2px;
      }

      .link-card h2 {
        margin: 0 0 8px;
        color: var(--accent-dark);
        font-size: 1.35rem;
        letter-spacing: 0;
      }

      .link-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">aras-package-aml-harness</p>
      <h1>Project Docs</h1>
      <p class="lead">
        AML XML validation harness project documents and generated task history pages.
      </p>

      <nav class="links" aria-label="Documentation pages">
        <a class="link-card" href="./task-site/">
          <h2>Task History</h2>
          <p>View task plans, reviews, implementation notes, and generated task summaries.</p>
        </a>
      </nav>
    </main>
  </body>
</html>
