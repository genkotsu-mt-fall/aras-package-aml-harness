name: Build Windows exe

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build aml-harness.exe
    runs-on: windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        shell: pwsh
        run: python -m pip install -r requirements-dev.txt

      - name: Build executable
        shell: pwsh
        run: ./scripts/build_exe.ps1

      - name: Create development GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXE_PATH: dist/aml-harness.exe
        run: |
          $ErrorActionPreference = "Stop"

          if (!(Test-Path $env:EXE_PATH)) {
            throw "Executable not found: $env:EXE_PATH"
          }

          $baseVersion = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          $tag = "v$baseVersion-dev.${{ github.run_number }}.${{ github.run_attempt }}"
          $sha = "${{ github.sha }}"

          gh release create $tag $env:EXE_PATH `
            --title "aml-harness $tag" `
            --notes "Development build from main commit: $sha" `
            --target "$sha" `
            --prerelease
